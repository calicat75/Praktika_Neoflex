spring.application.name=Praktika_Neoflex

server.port=8081

# ===========================
# DATABASE
# ===========================

spring.datasource.url=jdbc:postgresql://localhost:5432/account_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA
# ===========================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# ===========================
# FLYWAY
# ===========================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===========================
# LOGGING
# ===========================

logging.level.org.hibernate.SQL=DEBUG

logging.level.ru.bank.accountservice=DEBUG

# ===========================
# SWAGGER
# ===========================

springdoc.swagger-ui.path=/swagger-ui.html

# ===========================
# OTHER SERVICES
# ===========================

customer.service.url=http://localhost:8082

loan.service.url=http://localhost:8083

transaction.service.url=http://localhost:8084

# ===========================
# ACTUATOR
# ===========================

management.endpoints.web.exposure.include=health,info
